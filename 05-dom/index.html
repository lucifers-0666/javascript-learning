<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Practice</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    .box { padding: 10px; margin: 10px 0; background: white; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; }
    input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
    #output { background: #222; color: #0f0; padding: 15px; border-radius: 6px; font-family: monospace; min-height: 50px; }
  </style>
</head>
<body>
  <h1>DOM Practice Page 🧪</h1>

  <div class="box" id="main-box">
    <p id="para">Hello, I am a paragraph.</p>
    <button id="btn1">Click Me!</button>
    <button id="btn2">Add Element</button>
    <button id="btn3">Remove Last</button>
  </div>

  <div class="box">
    <h3>Form Practice</h3>
    <input type="text" id="nameInput" placeholder="Type your name...">
    <button id="greetBtn">Greet</button>
  </div>

  <div class="box">
    <h3>Event Delegation (click any item)</h3>
    <ul id="list">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
  </div>

  <div class="box">
    <h3>Output Log</h3>
    <div id="output">// Output will appear here...</div>
  </div>

  <script src="01-selecting-elements.js"></script>
  <script src="02-manipulating-elements.js"></script>
  <script src="03-events.js"></script>
  <script src="04-event-bubbling-delegation.js"></script>
  <script src="05-creating-removing-elements.js"></script>
  <script src="06-dom-traversal.js"></script>
  <script src="07-forms.js"></script>
  <script src="08-styles-and-attributes.js"></script>
</body>
</html>
